<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Pesquisa CIMED</title>
  <style>
    :root {
      --primary: #f2e024;
      --primary-dim: rgba(242, 224, 36, 0.15);
      --bg: #0f1115;
      --surface: #1a1d24;
      --surface2: #252a33;
      --text: #f0f0f0;
      --text-muted: #a0a5b1;
      --border: #333a47;
    }
    body {
      margin: 0; font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text); padding: 20px;
    }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
    }
    h1 { margin: 0; font-size: 20px; font-weight: 600; }
    .stats { color: var(--primary); font-size: 14px; font-weight: bold; background: var(--primary-dim); padding: 4px 12px; border-radius: 20px;}
    .table-container { overflow-x: auto; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
    th, td { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    th { background: var(--surface2); color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: rgba(255,255,255,0.02); }
    .td-id { color: var(--text-muted); width: 50px; }
    .td-date { color: var(--primary); width: 150px; }
    .ans-box { 
      background: var(--surface2); padding: 8px; border-radius: 6px; 
      max-height: 100px; overflow-y: auto; font-family: monospace; font-size: 11px; color: #d1d5db; white-space: pre-wrap; 
    }
    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
  </style>
</head>
<body>

  <div class="header">
    <h1>Painel de Respostas - Grupo CIMED</h1>
    <div class="stats" id="totalCount">Carregando...</div>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Data/Hora</th>
          <th>Respostas (JSON)</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="3" class="loading">Buscando dados da API...</td></tr>
      </tbody>
    </table>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = 'https://nnntghaltqsbzwkuohzn.supabase.co/';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ubnRnaGFsdHFzYnp3a3VvaHpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MzEzNDQsImV4cCI6MjA5MjIwNzM0NH0.6wjDPFa8LgHLBxYH_OAxCUhaArX1m9VmNcGis5INMdA';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function loadData() {
      try {
        const { data, error } = await supabase.from('responses').select('*').order('created_at', { ascending: false });
        if (error) throw error;
        
        document.getElementById('totalCount').innerText = `${data.length} Envios Registrados`;
        
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        if(data.length === 0) {
           tbody.innerHTML = '<tr><td colspan="3" class="loading">Nenhuma reposta registrada ainda na nuvem.</td></tr>';
           return;
        }

        data.forEach(row => {
          const tr = document.createElement('tr');
          const date = new Date(row.created_at).toLocaleString('pt-BR');
          tr.innerHTML = `
            <td class="td-id">#${row.id}</td>
            <td class="td-date">${date}</td>
            <td><div class="ans-box">${JSON.stringify(row.answers, null, 2)}</div></td>
          `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        document.getElementById('tableBody').innerHTML = `<tr><td colspan="3" class="loading" style="color:#ff6b6b">Erro: Verifique se a tabela 'responses' foi criada no Supabase e se o acesso foi habilitado.<br>${err.message}</td></tr>`;
      }
    }
    
    loadData();
  </script>
</body>
</html>
